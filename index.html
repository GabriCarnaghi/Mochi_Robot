<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mochi Bot">
    
    <title>Mochi AI Robot</title>
    
    <style>
        body { 
            background: black; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 101vh; /* 1% extra para permitir el auto-scroll */
            width: 100vw;
            touch-action: none;
            font-family: sans-serif;
        }

        .face-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px;
            position: relative;
            transition: transform 0.3s ease;
        }

        .eye {
            width: 120px; 
            height: 170px; 
            background-color: white; 
            border-radius: 60px; 
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease-out;
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
        }

        .pupil {
            width: 55px;
            height: 75px;
            background-color: #1a1a1a;
            border-radius: 50%;
            position: absolute;
            top: 45px; left: 32px;
            transition: transform 0.1s ease-out;
        }

        /* Estados Visuales */
        .scared { background-color: #ff4d4d !important; transform: scale(1.2); }
        .happy { transform: scaleY(0.8) rotate(5deg); background-color: #00FFCC !important; }
        .blink { height: 10px !important; margin-top: 80px; }

        /* Elementos ocultos */
        #video { position: absolute; width: 80px; height: 60px; opacity: 0; pointer-events: none; }
        #canvas { display: none; }
        #msg { position: absolute; top: 20px; color: white; opacity: 0.4; font-size: 12px; }
    </style>
</head>
<body onclick="startRobot()">

    <div id="msg">Toca para activar visión y sonido</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div id="face" class="face-container">
        <div id="eL" class="eye"><div id="pL" class="pupil"></div></div>
        <div id="eR" class="eye"><div id="pR" class="pupil"></div></div>
    </div>

    <audio id="sndHappy" src="https://assets.mixkit.co/active_storage/sfx/2861/2861-preview.mp3"></audio>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const eyes = document.querySelectorAll('.eye');
        const pupils = document.querySelectorAll('.pupil');
        const sndHappy = document.getElementById('sndHappy');
        const msg = document.getElementById('msg');
        
        let prevFrame = null;
        let isActive = false;

        // 1. INICIO Y PANTALLA COMPLETA
        function startRobot() {
            if(isActive) return;
            isActive = true;
            msg.style.display = 'none';
            
            // Truco de scroll para ocultar barras
            window.scrollTo(0, 1);
            
            // Activar Cámara
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    video.srcObject = stream;
                    sndHappy.play();
                    requestAnimationFrame(processAI);
                })
                .catch(err => alert("Cámara no disponible"));
        }

        // 2. VISIÓN ARTIFICIAL LITE (Detección de Movimiento)
        function processAI() {
            canvas.width = 40;
            canvas.height = 30;
            ctx.drawImage(video, 0, 0, 40, 30);
            const currentFrame = ctx.getImageData(0, 0, 40, 30).data;

            if (prevFrame) {
                let change = 0;
                for (let i = 0; i < currentFrame.length; i += 4) {
                    let d = Math.abs(currentFrame[i] - prevFrame[i]);
                    if (d > 45) change++;
                }

                // Lógica de Reacción
                if (change > 350) { // MOVIMIENTO MUY CERCA (Susto)
                    applyEffect('scared', 800);
                } else if (change > 60) { // MOVIMIENTO LEJOS (Saludo)
                    applyEffect('happy', 1200);
                }
            }
            prevFrame = currentFrame;
            setTimeout(() => requestAnimationFrame(processAI), 150);
        }

        function applyEffect(className, duration) {
            eyes.forEach(e => e.classList.add(className));
            if(className === 'happy') sndHappy.play();
            
            setTimeout(() => {
                eyes.forEach(e => e.classList.remove(className));
            }, duration);
        }

        // 3. MOVIMIENTO POR INCLINACIÓN (ACELERÓMETRO)
        window.addEventListener('deviceorientation', (event) => {
            let x = event.gamma / 2;
            let y = (event.beta - 45) / 2;
            pupils.forEach(p => {
                p.style.webkitTransform = `translate(${x}px, ${y}px)`;
                p.style.transform = `translate(${x}px, ${y}px)`;
            });
        });

        // 4. PARPADEO ALEATORIO
        function doBlink() {
            if(!document.querySelector('.scared')){
                eyes.forEach(e => e.classList.add('blink'));
                setTimeout(() => {
                    eyes.forEach(e => e.classList.remove('blink'));
                }, 150);
            }
            setTimeout(doBlink, Math.random() * 4000 + 2000);
        }
        doBlink();

        // Forzar scroll al cargar
        window.onload = function() {
            setTimeout(() => window.scrollTo(0, 1), 500);
        };
    </script>
</body>
</html>
