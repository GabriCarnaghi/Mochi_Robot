<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Mochi Robot</title>
    <style>
        body { background: black; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100vw; }
        
        /* Contenedor de la cara según tu imagen */
        .face-container { display: flex; align-items: center; gap: 80px; position: relative; }
        
        .eye { 
            width: 110px; height: 160px; background: white; border-radius: 55px; 
            position: relative; overflow: hidden; transition: all 0.15s ease;
        }

        .pupil { 
            width: 50px; height: 70px; background: #111; border-radius: 50%; 
            position: absolute; top: 45px; left: 30px; 
        }

        /* Boca de la imagen */
        .mouth {
            width: 60px; height: 30px; border: 8px solid white; border-top: 0;
            border-radius: 0 0 40px 40px; position: absolute; bottom: -50px; left: calc(50% - 38px);
        }

        /* Estados */
        .blink { height: 10px !important; margin-top: 75px; }
        .scared { background: #ff3333 !important; transform: scale(1.2); }
        
        #video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #msg { position: absolute; top: 20px; color: white; font-family: sans-serif; font-size: 14px; text-align: center; width: 100%; }
    </style>
</head>
<body onclick="activarTodo()">

    <div id="msg">¡TOCA LA PANTALLA PARA COMENZAR!</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div class="face-container">
        <div id="eL" class="eye"><div class="p" class="pupil"></div></div>
        <div class="mouth"></div>
        <div id="eR" class="eye"><div class="p" class="pupil"></div></div>
    </div>

    <audio id="snd" src="https://assets.mixkit.co/active_storage/sfx/2861/2861-preview.mp3"></audio>

    <script>
        var video = document.getElementById('video');
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var msg = document.getElementById('msg');
        var eyes = document.querySelectorAll('.eye');
        var pupils = document.querySelectorAll('.p');
        var snd = document.getElementById('snd');
        var prevFrame = null;
        var inicializado = false;

        function activarTodo() {
            if (inicializado) return;
            msg.innerHTML = "Iniciando sensores...";
            
            // 1. Activar Sonido
            snd.play();
            
            // 2. Activar Cámara
            var constraints = { video: { facingMode: "user", width: 160, height: 120 } };
            navigator.mediaDevices.getUserMedia(constraints)
            .then(function(stream) {
                video.srcObject = stream;
                msg.style.display = 'none';
                inicializado = true;
                procesarIA();
            })
            .catch(function(err) {
                alert("Error Cámara: " + err);
                msg.innerHTML = "Error de cámara. Revisa permisos.";
            });

            window.scrollTo(0, 1);
        }

        function procesarIA() {
            ctx.drawImage(video, 0, 0, 40, 30);
            var frame = ctx.getImageData(0, 0, 40, 30).data;

            if (prevFrame) {
                var diff = 0;
                for (var i = 0; i < frame.length; i += 4) {
                    if (Math.abs(frame[i] - prevFrame[i]) > 50) diff++;
                }

                if (diff > 250) { // Sustazo
                    reaccionar('scared');
                }
            }
            prevFrame = frame;
            setTimeout(procesarIA, 150);
        }

        function reaccionar(tipo) {
            eyes.forEach(function(e) { e.className = 'eye ' + tipo; });
            setTimeout(function() {
                eyes.forEach(function(e) { e.className = 'eye'; });
            }, 1000);
        }

        // Movimiento Ojos
        window.addEventListener('deviceorientation', function(e) {
            var x = e.gamma / 2;
            var y = (e.beta - 45) / 2;
            pupils.forEach(function(p) {
                p.style.webkitTransform = 'translate('+x+'px,'+y+'px)';
                p.style.transform = 'translate('+x+'px,'+y+'px)';
            });
        });

        // Parpadeo
        function blink() {
            if (!inicializado || document.querySelector('.scared')) {
                setTimeout(blink, 2000);
                return;
            }
            eyes.forEach(function(e) { e.classList.add('blink'); });
            setTimeout(function() {
                eyes.forEach(function(e) { e.classList.remove('blink'); });
            }, 150);
            setTimeout(blink, Math.random() * 4000 + 2000);
        }
        blink();
    </script>
</body>
</html>
