<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mochi Robot Face</title>
    <style>
        body {
            background: black;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            font-family: sans-serif;
        }

        .container {
            display: flex;
            gap: 50px;
        }

        .eye {
            width: 100px;
            height: 150px;
            background-color: #051a1a;
            border: 4px solid #00FFCC;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transition: height 0.1s;
        }

        .pupil {
            width: 50px;
            height: 70px;
            background-color: #00FFCC;
            border-radius: 50%;
            position: absolute;
            top: 40px;
            left: 25px;
            box-shadow: 0 0 20px #00FFCC;
            transition: transform 0.1s ease-out;
        }

        /* Clase para parpadear */
        .blink {
            height: 10px !important;
            margin-top: 70px;
            background-color: #00FFCC !important;
        }
        .blink .pupil { display: none; }

        /* Instrucción inicial */
        #msg {
            position: absolute;
            bottom: 20px;
            color: #00FFCC;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="msg">Toca para activar sonido</div>

    <div class="container">
        <div id="eyeL" class="eye"><div class="pupil"></div></div>
        <div id="eyeR" class="eye"><div class="pupil"></div></div>
    </div>

    <audio id="snd" src="https://assets.mixkit.co/active_storage/sfx/2861/2861-preview.mp3"></audio>

    <script>
        const pupils = document.querySelectorAll('.pupil');
        const eyes = document.querySelectorAll('.eye');
        const snd = document.getElementById('snd');
        const msg = document.getElementById('msg');

        // Movimiento con inclinación (Acelerómetro)
        window.addEventListener('deviceorientation', (event) => {
            let x = event.gamma / 1.5; // Izquierda - Derecha
            let y = (event.beta - 45) / 1.5; // Adelante - Atrás
            
            pupils.forEach(p => {
                p.style.transform = `translate(${x}px, ${y}px)`;
            });
        });

        // Interacción táctil: Sonido y Alegría
        window.addEventListener('touchstart', () => {
            msg.style.display = 'none';
            snd.play();
            // Efecto de ojos grandes al tocar
            pupils.forEach(p => p.style.transform = 'scale(1.3)');
            setTimeout(() => {
                pupils.forEach(p => p.style.transform = 'scale(1)');
            }, 500);
        });

        // Parpadeo automático
        function doBlink() {
            eyes.forEach(e => e.classList.add('blink'));
            setTimeout(() => {
                eyes.forEach(e => e.classList.remove('blink'));
            }, 150);
            setTimeout(doBlink, Math.random() * 4000 + 2000);
        }
        
        doBlink();
    </script>
</body>
</html>
