<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Mochi Robot</title>
    <style>
        body { 
            background: black; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100vw; 
            touch-action: none;
        }
        
        /* Cara inspirada en tu imagen */
        .face-container { 
            display: flex; 
            align-items: center; 
            gap: 80px; 
            position: relative; 
        }
        
        .eye { 
            width: 110px; 
            height: 160px; 
            background: white; 
            border-radius: 55px; 
            position: relative; 
            overflow: hidden; 
            transition: height 0.15s ease, margin-top 0.15s ease;
        }

        .pupil { 
            width: 50px; 
            height: 70px; 
            background: #111; 
            border-radius: 50%; 
            position: absolute; 
            top: 45px; 
            left: 30px; 
            transition: transform 0.1s ease-out;
        }

        /* La boca curva de tu imagen */
        .mouth {
            width: 60px; 
            height: 30px; 
            border: 8px solid white; 
            border-top: 0;
            border-radius: 0 0 40px 40px; 
            position: absolute; 
            bottom: -55px; 
            left: calc(50% - 38px);
        }

        /* Animaciones */
        .blink { height: 10px !important; margin-top: 75px; }
        .happy-eye { transform: scaleY(0.7) !important; border-radius: 55px 55px 20px 20px !important; }
        
        #msg { 
            position: absolute; 
            bottom: 20px; 
            color: white; 
            font-family: sans-serif; 
            font-size: 14px; 
            opacity: 0.5; 
        }
    </style>
</head>
<body onclick="interactuar()">

    <div id="msg">Toca para interactuar</div>

    <div class="face-container">
        <div id="eL" class="eye"><div class="p pupil"></div></div>
        <div class="mouth"></div>
        <div id="eR" class="eye"><div class="p pupil"></div></div>
    </div>

    <audio id="snd" src="https://assets.mixkit.co/active_storage/sfx/2861/2861-preview.mp3"></audio>

    <script>
        var eyes = document.querySelectorAll('.eye');
        var pupils = document.querySelectorAll('.p');
        var snd = document.getElementById('snd');
        var msg = document.getElementById('msg');

        // Función cuando tocas la pantalla
        function interactuar() {
            msg.style.display = 'none';
            
            // Sonido
            snd.play();

            // Gesto de felicidad
            eyes.forEach(function(e) { e.classList.add('happy-eye'); });
            
            setTimeout(function() {
                eyes.forEach(function(e) { e.classList.remove('happy-eye'); });
            }, 1000);

            // Forzar ocultar barras de Safari
            window.scrollTo(0, 1);
        }

        // Movimiento de pupilas con la inclinación del iPhone
        window.addEventListener('deviceorientation', function(e) {
            // Gamma es izquierda/derecha, Beta es adelante/atrás
            var x = e.gamma / 1.5;
            var y = (e.beta - 45) / 1.5; 
            
            pupils.forEach(function(p) {
                p.style.webkitTransform = 'translate(' + x + 'px,' + y + 'px)';
                p.style.transform = 'translate(' + x + 'px,' + y + 'px)';
            });
        });

        // Parpadeo automático
        function blink() {
            var isHappy = document.querySelector('.happy-eye');
            if (!isHappy) {
                eyes.forEach(function(e) { e.classList.add('blink'); });
                setTimeout(function() {
                    eyes.forEach(function(e) { e.classList.remove('blink'); });
                }, 150);
            }
            setTimeout(blink, Math.random() * 4000 + 2000);
        }

        // Iniciar parpadeo y ocultar barras al cargar
        window.onload = function() {
            blink();
            setTimeout(function() { window.scrollTo(0, 1); }, 500);
        };
    </script>
</body>
</html>
