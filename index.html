<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: black; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { display: flex; }
        .eye { 
            width: 80px; height: 120px; border: 4px solid #00FFCC; border-radius: 50%; 
            margin: 20px; position: relative; overflow: hidden; 
        }
        .pupil { 
            width: 40px; height: 60px; background: #00FFCC; border-radius: 50%; 
            position: absolute; top: 30px; left: 20px; 
        }
        .blink { height: 5px !important; margin-top: 60px !important; }
    </style>
</head>
<body onclick="activarMochi()">

    <div class="container">
        <div id="eL" class="eye"><div id="pL" class="pupil"></div></div>
        <div id="eR" class="eye"><div id="pR" class="pupil"></div></div>
    </div>

    <audio id="audio" src="https://assets.mixkit.co/active_storage/sfx/2861/2861-preview.mp3" preload="auto"></audio>

    <script>
        var pL = document.getElementById('pL');
        var pR = document.getElementById('pR');
        var eL = document.getElementById('eL');
        var eR = document.getElementById('eR');
        var audio = document.getElementById('audio');

        // Función para activar sonido al tocar
        function activarMochi() {
            audio.play();
        }

        // Movimiento para iPhone 4 (Safari Viejo)
        window.ondeviceorientation = function(event) {
            var x = event.gamma / 2;
            var y = (event.beta - 45) / 2;
            
            pL.style.webkitTransform = 'translate(' + x + 'px,' + y + 'px)';
            pR.style.webkitTransform = 'translate(' + x + 'px,' + y + 'px)';
        };

        // Parpadeo simple
        function parpadear() {
            eL.className = 'eye blink';
            eR.className = 'eye blink';
            setTimeout(function() {
                eL.className = 'eye';
                eR.className = 'eye';
            }, 150);
            setTimeout(parpadear, Math.random() * 4000 + 2000);
        }
        parpadear();
    </script>
</body>
</html>
