<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Mochi Robot v3.0</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
            /* Fuerza orientación horizontal en navegadores modernos */
            transform: rotate(0deg); 
        }

        .face-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 120px; /* Separación entre ojos */
            position: relative;
        }

        .eye {
            /* Estilo minimalista de la imagen */
            width: 130px; 
            height: 180px; 
            background-color: white; 
            border-radius: 65px; /* Bordes muy redondeados, casi elípticos */
            position: relative;
            overflow: hidden;
            transition: height 0.1s ease-out, transform 0.1s ease-out;
            box-shadow: 0 0 30px white;
        }

        /* Pupilas (el movimiento) - Un poco más oscuras para contraste */
        .pupil {
            width: 60px;
            height: 80px;
            background-color: #222;
            border-radius: 50%;
            position: absolute;
            top: 50px; left: 35px; /* Centro inicial */
            transition: transform 0.05s ease-out;
            box-shadow: inset 0 0 10px black;
        }

        /* Boca minimalista de la imagen (un poco más gruesa) */
        .mouth {
            width: 80px;
            height: 40px;
            background-color: black; /* El fondo es blanco sobre negro, la boca es blanca */
            border: 10px solid white;
            border-top: none; /* Solo borde inferior */
            border-radius: 0 0 50px 50px;
            position: absolute;
            bottom: -60px; /* Debajo de los ojos */
            left: calc(50% - 40px); /* Centrada */
            box-shadow: 0 5px 15px white;
        }

        /* Clase de parpadeo */
        .blink {
            height: 10px !important;
            border-radius: 5px !important;
        }
        .blink .pupil { display: none; }

        /* Clase para expresión feliz al tocar */
        .happy {
            transform: scaleY(0.7); /* Se achican los ojos vertically */
            border-radius: 50% 50% 0 0 !important;
        }

        /* Instrucción inicial */
        #msg {
            position: absolute;
            top: 20px;
            color: white;
            font-family: sans-serif;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="msg">Toca para activar sonido</div>

    <div class="face-container">
        <div id="eyeL" class="eye"><div class="pupil"></div></div>
        <div class="mouth"></div> <div id="eyeR" class="eye"><div class="pupil"></div></div>
    </div>

    <audio id="sndTouch" src="https://assets.mixkit.co/active_storage/sfx/2861/2861-preview.mp3" preload="auto"></audio>

    <script>
        // Referencias a los elementos
        var eyeL = document.getElementById('eyeL');
        var eyeR = document.getElementById('eyeR');
        var pL = eyeL.querySelector('.pupil');
        var pR = eyeR.querySelector('.pupil');
        var sndTouch = document.getElementById('sndTouch');
        var msg = document.getElementById('msg');
        var face = document.querySelector('.face-container');

        // 1. Solución Sonido e Interacción: Tocar la pantalla
        // Usamos addEventListener para mejor compatibilidad con iPhone 5
        document.body.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Previene zoom
            msg.style.display = 'none'; // Oculta el mensaje
            
            // Reproducir sonido
            sndTouch.play();

            // Cambiar expresión a "Feliz"
            eyeL.classList.add('happy');
            eyeR.classList.add('happy');

            // Volver a la normalidad después de 1 segundo
            setTimeout(function() {
                eyeL.classList.remove('happy');
                eyeR.classList.remove('happy');
            }, 1000);
        });

        // 2. Movimiento: Rotación para pantalla completa horizontal
        // Cuando gires el iPhone 5 en horizontal (landscape), el acelerómetro se ajusta solo.
        window.addEventListener('deviceorientation', function(event) {
            // Gamma es el eje de inclinación izquierda/derecha cuando está en horizontal
            // Beta es el eje adelante/atrás cuando está en horizontal
            var x = event.gamma / 1.5; 
            var y = (event.beta - 45) / 1.5; // Ajuste para que la cara mire de frente por defecto
            
            pL.style.transform = 'translate(' + x + 'px,' + y + 'px)';
            pR.style.transform = 'translate(' + x + 'px,' + y + 'px)';
        });

        // 3. Parpadeo Aleatorio
        function parpadear() {
            eyeL.classList.add('blink');
            eyeR.classList.add('blink');
            setTimeout(function() {
                eyeL.classList.remove('blink');
                eyeR.classList.remove('blink');
            }, 150);
            setTimeout(parpadear, Math.random() * 4000 + 2000);
        }
        parpadear();
    </script>
</body>
</html>
